upstream backend_upstream {
    ip_hash;
    server backend-1:5000;
    server backend-2:5000;
    keepalive 32;
}

# 🔴 HTTP → HTTPS redirect
server {
    listen 80;
    server_name meetixchat.online www.meetixchat.online;

    return 301 https://$host$request_uri;
}

# 🟢 HTTPS SERVER
server {
    listen 443 ssl;
    server_name meetixchat.online www.meetixchat.online;

    ssl_certificate /etc/letsencrypt/live/meetixchat.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meetixchat.online/privkey.pem;

    # 🔐 Recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1000;

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # 🔥 API
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🔥 WebSocket (VERY IMPORTANT for your app)
    location /socket.io/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 🔥 Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
