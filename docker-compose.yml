services:
  backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: video-chat-backend:latest
    restart: unless-stopped
    mem_limit: 300m
    env_file:
      - ./backend/.env.production
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/healthz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: video-chat-backend:latest
    restart: unless-stopped
    mem_limit: 300m
    env_file:
      - ./backend/.env.production
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/healthz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_SOCKET_URL: ""
    image: video-chat-frontend:latest
    restart: unless-stopped
    mem_limit: 300m
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
